<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Estampador de Fotos</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pay-btn { background-color: #ff6600; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; }
        #seccionSellado { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VENTANIYA SOLUCIONES</h1>
        <button class="pay-btn" id="btnIngreso">ABONAR TASA Y ACCEDER</button>
        
        <div id="seccionSellado">
            <input type="file" id="archivoInput" accept="image/*">
            <p>Subí tu documento para sellar.</p>
        </div>
    </div>

    <script src="js/stamp.js"></script>
    <script>
        const btn = document.getElementById('btnIngreso');
        btn.onclick = function() {
            window.open("https://link.mercadopago.com.ar/ventaniyasoluciones", "_blank");
            document.getElementById('seccionSellado').style.display = 'block';
            btn.innerHTML = "PAGO REALIZADO - ELEGÍ TU ARCHIVO";
        };

        document.getElementById('archivoInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                aplicarSello(event.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
